# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: [self-hosted,linux,gpu]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      
      - name: Set up gamer and library path on eureka the in the Makefile and run test.
        run: |
          grep 'CUDA_PATH\s*:= \/software' src/Makefile
          #Set up GPU archetecher
          sed -i 's/SIMU_OPTION += -DGPU_ARCH/SIMU_OPTION += -DGPU_ARCH=TURING #/g' src/Makefile
          #Set up library pathes
          sed -i 's/#CUDA_PATH\s*:= \/software/CUDA_PATH    := \/software/g' src/Makefile
          sed -i 's/#FFTW_PATH\s*:= \/software/FFTW_PATH    := \/software/g' src/Makefile
          sed -i 's/#HDF5_PATH\s*:= \/software/HDF5_PATH    := \/software/g' src/Makefile
          sed -i 's/#MPI_PATH\s*:= \/sofrware/MPI_PATH     := \/software/g' src/Makefile
          sed -i 's/#GSL_PATH\s*:= \/software/GSL_PATH     := \/software/g' src/Makefile
          
          grep 'CUDA_PATH\s*:= \/software' src/Makefile
          
          cd regression_test
          #python regression_test.py -t test_group
          #sh action_script.job
